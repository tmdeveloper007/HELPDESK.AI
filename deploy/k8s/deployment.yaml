apiVersion: apps/v1
kind: Deployment
metadata:
  name: helpdesk-backend
  labels:
    app: helpdesk-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: helpdesk-backend
  template:
    metadata:
      labels:
        app: helpdesk-backend
    spec:
      containers:
        - name: api
          image: helpdesk-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 7860
              name: http
          envFrom:
            - secretRef:
                name: helpdesk-backend-env
                optional: true
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
