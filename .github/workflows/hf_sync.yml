name: Sync to Hugging Face Hub

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/hf_sync.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Prepare Backend for Deployment
        run: |
          # Create a temporary deployment directory
          mkdir deploy_dir
          
          # Copy backend contents to the root of the deployment directory
          cp -r backend/* deploy_dir/
          
          # Ensure README and Dockerfile are in the root of the deployment directory
          # (They are already in backend/, but this ensures they stay in the root of the Space)
          cd deploy_dir
          
          # Fix the Dockerfile to use local paths since we are now in the backend root
          # Replace 'backend/' prefix with './'
          sed -i 's/COPY backend\//COPY .\//g' Dockerfile
          sed -i 's/COPY backend /COPY . /g' Dockerfile
          
          # Initialize a fresh git repo for the Space
          git init
          git config user.name github-actions
          git config user.email github-actions@github.com
          git checkout -b main || git branch -M main
          git add .
          git commit -m "deploy: sync from github main"

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          cd deploy_dir
          # Force push to the Hugging Face Space repository
          git push --force https://ritesh19180:$HF_TOKEN@huggingface.co/spaces/ritesh19180/ai-helpdesk-api main
